workflows:
  android-release:
    name: Android APK Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Créer les dossiers plateforme Android
        script: flutter create . --platforms=android
      - name: Installer les dépendances
        script: flutter pub get
      - name: Build APK release
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - votre-email@gmail.com   # ← remplace par ton email
        notify:
          success: true
          failure: true

  web-release:
    name: Web Build
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Créer les dossiers plateforme Web
        script: flutter create . --platforms=web
      - name: Installer les dépendances
        script: flutter pub get
      - name: Build Web
        script: flutter build web --release
    artifacts:
      - build/web/**
